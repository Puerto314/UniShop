<div class="toast-container">
  <div
    *ngFor="let t of notify.toasts()"
    class="toast toast-{{ t.type }}"
    [@toastAnim]
    (click)="notify.dismiss(t.id)"
  >
    <span class="toast-icon">{{ icon(t.type) }}</span>
    <span class="toast-msg">{{ t.message }}</span>
    <button class="toast-close" (click)="notify.dismiss(t.id)">✕</button>
  </div>
</div>
